<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>自作パチンコシミュレーター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        
        <div id="side-panel">
            <div id="ui">
                <p>持ち玉: <span id="ball-count" class="highlight">100</span> 発</p>
                <p>スタート: <span id="start-count" class="highlight">0</span> 回</p>
            </div>

            <h2>エヴァ15風 液晶モニター</h2>
            <div id="digital-screen">
                <div class="slot" id="slot-1">0</div>
                <div class="slot" id="slot-2">0</div>
                <div class="slot" id="slot-3">0</div>
            </div>
<div id="reserve-display">
                保留: 
                <div id="reserve-icons">
                    <span class="reserve-icon"></span>
                    <span class="reserve-icon"></span>
                    <span class="reserve-icon"></span>
                    <span class="reserve-icon"></span>
                </div>
            </div>            
            <div id="jackpot-message">!!! GREAT JOB !!!</div>
            
            <div id="jackpot-info" style="display: none;">
                <p>ROUND: <span id="round-display">1</span> / 15</p>
                <p>COUNT: <span id="count-display">0</span> / 10</p>
            </div>
        </div>

        <div id="game-container">
            <div id="power-bar-container">
                <div id="power-bar-fill"></div>
            </div>
            
            <div id="jackpot-overlay" class="rainbow-effect"></div> 
            <div id="flash-overlay"></div>
            
        </div>

        <div id="mobile-controls">
            <button id="btn-power-down" class="control-btn">◀ 弱</button>
            <button id="btn-shoot" class="control-btn shoot-btn">🔴 打つ(長押し)</button>
            <button id="btn-power-up" class="control-btn">強 ▶</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
