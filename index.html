<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- ★ viewportが抜けていると拡大縮小がきかないので必ず入れる -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自作パチンコシミュレーター</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div id="app-wrapper">
        
        <div id="side-panel">
            <div id="ui">
                <p>持ち玉: <span id="ball-count" class="highlight">100</span> 発</p>
                <p>スタート: <span id="start-count" class="highlight">0</span> 回</p>
            </div>

            <!-- ★ リーチ演出テキスト -->
            <div id="reach-text" style="display:none;">リーチ！</div>

            <h2>エヴァ15風 液晶モニター</h2>
            <div id="digital-screen">
                <div class="slot" id="slot-1">0</div>
                <div class="slot" id="slot-2">0</div>
                <div class="slot" id="slot-3">0</div>
            </div>

            <div id="reserve-display">
                <div class="reserve-row">
                    <span class="reserve-label">ヘソ:</span> 
                    <div id="heso-icons" class="reserve-icons">
                        <span class="reserve-icon heso-icon"></span>
                        <span class="reserve-icon heso-icon"></span>
                        <span class="reserve-icon heso-icon"></span>
                        <span class="reserve-icon heso-icon"></span>
                    </div>
                </div>
                <div class="reserve-row">
                    <span class="reserve-label">電チュー:</span> 
                    <div id="denchu-icons" class="reserve-icons">
                        <span class="reserve-icon denchu-icon"></span>
                        <span class="reserve-icon denchu-icon"></span>
                        <span class="reserve-icon denchu-icon"></span>
                        <span class="reserve-icon denchu-icon"></span>
                    </div>
                </div>
            </div>        
            <div id="jackpot-message">!!! GREAT JOB !!!</div>
            
            <div id="jackpot-info" style="display: none;">
                <p>ROUND: <span id="round-display">1</span> / 5</p>
                <p>COUNT: <span id="count-display">0</span> / 3</p>
            </div>

            <!-- ★ モード表示エリア -->
            <div id="mode-display" style="display: none;">
                <p id="mode-name">IMPACT MODE</p>
                <p>残り <span id="mode-spins-left">0</span> 回転</p>
            </div>
        </div>

        <div id="game-container">
            <div id="power-bar-container">
                <div id="power-bar-fill"></div>
            </div>
            <div id="jackpot-overlay"></div> 
            <div id="flash-overlay"></div>
        </div>

        <div id="mobile-controls">
            <button id="btn-power-down" class="control-btn">◀ 弱</button>
            <button id="btn-shoot" class="control-btn shoot-btn">🔴 打つ(長押し)</button>
            <button id="btn-power-up" class="control-btn">強 ▶</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script type="module" src="main.js"></script>

    <!-- ★ ロンギヌス演出オーバーレイ -->
    <div id="longinus-overlay"></div>
</body>
</html>
